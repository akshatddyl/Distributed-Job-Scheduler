server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**

            - id: event-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/events/**

            - id: inventory-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/inventory/**

            - id: booking-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/bookings/**

# Must match the same secret used by services for JWT signing
jwt:
  secret: bXktc3VwZXItc2VjcmV0LWp3dC1rZXktZm9yLWJvb2tteXRpY2tldC1wbGF0Zm9ybS1kZXYtb25seQ==
